mode: dry_run # dry_run | testnet | live

strategy:
  supertrend:
    variant: classic # classic | ml_adaptive — see backend/config/bot.yml
    atr_period: 10
    multiplier: 3.0
  adx:
    period: 14
    threshold: 20
  rsi:
    period: 14
    overbought: 70
    oversold: 30
  vwap:
    session_reset_hour_utc: 0
  bos:
    swing_lookback: 10
  order_block:
    min_impulse_pct: 0.3
    ob_max_age: 20
  filters:
    funding_rate_threshold: 0.05
    cvd_window: 50
    relax_in_dry_run: true
  derivatives:
    oi_poll_interval: 30
  trailing_stop_pct: 0.2
  timeframes:
    trend: "1h"
    confirm: "15m"
    entry: "5m"
  candles_lookback: 100
  min_candles_required: 30

risk:
  risk_per_trade_pct: 1.5
  max_concurrent_positions: 3
  max_margin_per_position_pct: 40
  usd_to_inr_rate: 84.0
  paper_capital_inr: 10000

symbols:
  - symbol: BTCUSD
    leverage: 10
  - symbol: ETHUSD
    leverage: 15
  - symbol: SOLUSD
    leverage: 20

notifications:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
    events:
      status: true
      signals: true
      positions: true
      trailing: true
      errors: true
  daily_summary_time: "18:00"

logging:
  level: debug
  file: logs/bot.log
