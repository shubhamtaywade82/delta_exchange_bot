mode: testnet  # dry_run | testnet | live

strategy:
  supertrend:
    atr_period: 10
    multiplier: 3.0
  adx:
    period: 14
    threshold: 25
  trailing_stop_pct: 1.5
  timeframes:
    trend: "60"
    confirm: "15"
    entry: "5"
  candles_lookback: 100
  min_candles_required: 30

risk:
  risk_per_trade_pct: 1.5
  max_concurrent_positions: 5
  max_margin_per_position_pct: 40
  usd_to_inr_rate: 85.0

symbols:
  - symbol: BTCUSDT
    leverage: 10
  - symbol: ETHUSDT
    leverage: 15
  - symbol: SOLUSDT
    leverage: 20

notifications:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  daily_summary_time: "18:00"

logging:
  level: info
  file: logs/bot.log
