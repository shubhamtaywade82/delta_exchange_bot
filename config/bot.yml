mode: dry_run # dry_run | testnet | live

strategy:
  supertrend:
    atr_period: 10
    multiplier: 3.0
  adx:
    period: 14
    threshold: 20
  trailing_stop_pct: 0.2
  timeframes:
    trend: "1h"
    confirm: "15m"
    entry: "5m"
  candles_lookback: 100
  min_candles_required: 30

risk:
  risk_per_trade_pct: 1.5
  max_concurrent_positions: 3
  max_margin_per_position_pct: 40
  usd_to_inr_rate: 84.0
  paper_capital_inr: 10000

symbols:
  - symbol: BTCUSD
    leverage: 10
  - symbol: ETHUSD
    leverage: 15
  - symbol: SOLUSD
    leverage: 20

notifications:
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  daily_summary_time: "18:00"

logging:
  level: debug
  file: logs/bot.log
