# Async adapter only works within the same process. `./bin/dev` runs `bin/bot` and `rails s` separately,
# so tick broadcasts from the bot never reach browser subscribers unless Cable uses a shared backend (Redis).
development:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6379/1") %>
  channel_prefix: delta_exchange_bot_development_cable

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
