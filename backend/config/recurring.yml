production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  trading_reconciliation:
    class: "Trading::ReconciliationJob"
    queue: critical
    schedule: every minute

  strategy_retrain:
    class: "Trading::StrategyRetrainJob"
    queue: critical
    schedule: every hour

  learning_ai_refinement:
    class: "Trading::Learning::AiRefinementJob"
    queue: low
    schedule: every 10 minutes

  mark_prices_pnl:
    class: "Trading::MarkPricesPnlJob"
    queue: low
    schedule: every 5 seconds

  product_catalog_sync:
    class: "Trading::PersistProductSnapshotsJob"
    queue: low
    schedule: every 15 minutes

development:
  trading_reconciliation:
    class: "Trading::ReconciliationJob"
    queue: critical
    schedule: every minute

  strategy_retrain:
    class: "Trading::StrategyRetrainJob"
    queue: critical
    schedule: every hour

  learning_ai_refinement:
    class: "Trading::Learning::AiRefinementJob"
    queue: low
    schedule: every 10 minutes

  mark_prices_pnl:
    class: "Trading::MarkPricesPnlJob"
    queue: low
    schedule: every 5 seconds

  product_catalog_sync:
    class: "Trading::PersistProductSnapshotsJob"
    queue: low
    schedule: every 15 minutes
