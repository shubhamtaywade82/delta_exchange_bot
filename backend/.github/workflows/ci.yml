name: Backend CI/CD

on:
  pull_request:
    branches: [refactor, main]
    paths:
      - "backend/**"
  push:
    branches: [refactor, main]
    tags:
      - "v*"
    paths:
      - "backend/**"
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      deploy_ref:
        description: "Optional branch/tag/SHA to deploy"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: backend-cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUBY_VERSION: "3.3.4"

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref || github.sha }}

      - name: Checkout delta_exchange dependency (optional)
        if: vars.DELTA_EXCHANGE_REPOSITORY != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DELTA_EXCHANGE_REPOSITORY }}
          path: delta_exchange
          fetch-depth: 1

      - name: Validate local path dependencies
        run: |
          if [ -d "${GITHUB_WORKSPACE}/delta_exchange" ]; then
            ln -sfn "${GITHUB_WORKSPACE}/delta_exchange" "${GITHUB_WORKSPACE}/../delta_exchange"
          fi

          if [ ! -d "${GITHUB_WORKSPACE}/../delta_exchange" ]; then
            echo "::error::Missing required path gem at ../../delta_exchange."
            echo "::error::Set repository variable DELTA_EXCHANGE_REPOSITORY so CI can checkout that dependency, or replace the path gem with a registry/git source."
            exit 1
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('backend/.ruby-version', 'backend/**/.rubocop.yml', 'backend/**/.rubocop_todo.yml', 'backend/Gemfile.lock') }}
        with:
          path: backend/${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint Ruby style
        run: bin/rubocop -f github

      - name: Validate Zeitwerk autoloading
        run: bin/rails zeitwerk:check

  security:
    name: Security gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.deploy_ref || github.sha }}

      - name: Checkout delta_exchange dependency (optional)
        if: vars.DELTA_EXCHANGE_REPOSITORY != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DELTA_EXCHANGE_REPOSITORY }}
          path: delta_exchange
          fetch-depth: 1

      - name: Validate local path dependencies
        run: |
          if [ -d "${GITHUB_WORKSPACE}/delta_exchange" ]; then
            ln -sfn "${GITHUB_WORKSPACE}/delta_exchange" "${GITHUB_WORKSPACE}/../delta_exchange"
          fi

          if [ ! -d "${GITHUB_WORKSPACE}/../delta_exchange" ]; then
            echo "::error::Missing required path gem at ../../delta_exchange."
            echo "::error::Set repository variable DELTA_EXCHANGE_REPOSITORY so CI can checkout that dependency, or replace the path gem with a registry/git source."
            exit 1
          fi

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Scan gem vulnerabilities
        run: bin/bundler-audit update && bin/bundler-audit

      - name: Scan Rails code vulnerabilities
        run: bin/brakeman --quiet --no-pager --exit-on-warn --exit-on-error

  dependency_review:
    name: Dependency review (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref || github.sha }}

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  test:
    name: Test suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, security]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: backend_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d backend_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: "true"
      RAILS_ENV: test
      SECRET_KEY_BASE: test_secret_key_base_for_ci
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/backend_test
      REDIS_URL: redis://127.0.0.1:6379/1
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref || github.sha }}

      - name: Checkout delta_exchange dependency (optional)
        if: vars.DELTA_EXCHANGE_REPOSITORY != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DELTA_EXCHANGE_REPOSITORY }}
          path: delta_exchange
          fetch-depth: 1

      - name: Validate local path dependencies
        run: |
          if [ -d "${GITHUB_WORKSPACE}/delta_exchange" ]; then
            ln -sfn "${GITHUB_WORKSPACE}/delta_exchange" "${GITHUB_WORKSPACE}/../delta_exchange"
          fi

          if [ ! -d "${GITHUB_WORKSPACE}/../delta_exchange" ]; then
            echo "::error::Missing required path gem at ../../delta_exchange."
            echo "::error::Set repository variable DELTA_EXCHANGE_REPOSITORY so CI can checkout that dependency, or replace the path gem with a registry/git source."
            exit 1
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Prepare test database
        run: bin/rails db:prepare

      - name: Run backend specs
        run: bundle exec rspec --format progress

  package:
    name: Package release artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, security, test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref || github.sha }}

      - name: Create backend release tarball
        run: tar -czf backend-${{ github.sha }}.tar.gz backend

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-${{ github.sha }}
          path: backend-${{ github.sha }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  deploy_staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [package]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/refactor') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment == 'staging')
    environment: staging
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref || github.sha }}

      - name: Validate staging deploy command
        run: echo "Staging deployment gate passed. Configure secrets and replace with bin/kamal deploy."

  deploy_production:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [package]
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment == 'production' && github.ref == 'refs/heads/main')
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref || github.sha }}

      - name: Validate production deploy command
        run: echo "Production deployment gate passed. Configure protected environment and replace with bin/kamal deploy."

